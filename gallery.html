<body>

      </div>

  <div class="container">

    <!-- 页面标题 -->
    <header class="gallery-header" data-reveal>
      <h1 class="page-title">足迹</h1>
      <p class="gallery-count" id="gallery-count"></p>
    </header>

    <!-- 相册网格 -->
    <main class="gallery-container">
      <div id="gallery-grid" class="gallery-grid">
        <!-- 照片将通过 JavaScript 动态加载 -->
      </div>
    </main>

    <!-- 图片详情模态框 -->
    <div id="lightbox" class="lightbox">
      <div class="lightbox-content">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <button class="lightbox-nav lightbox-prev" onclick="navigatePhoto(-1)">&#8249;</button>
        <button class="lightbox-nav lightbox-next" onclick="navigatePhoto(1)">&#8250;</button>
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-caption">
          <h3 id="lightbox-title"></h3>
          <p id="lightbox-desc"></p>
          <span id="lightbox-date" class="lightbox-date"></span>
        </div>
      </div>
    </div>

    <footer>
      <p>同济大学哲学系 · 刘昊</p>
      <p>联系邮箱：<a href="mailto:liuhao1106@tongji.edu.cn">liuhao1106@tongji.edu.cn</a></p>
    </footer>
  </div>

  <script src="/js/main.js"></script>
  <script>
    // 加载照片数据
    let photosData = [];
    let currentPhotoIndex = 0;

    // 从 JSON 文件加载照片数据
    async function loadPhotos() {
      try {
        photosData = await fetchJSON('data/photos.json', []);
        // 按时间倒序排列（newest first），日期格式为 YYYY-MM 或 YYYY-MM-DD
        photosData.sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));
        renderGallery();
      } catch (error) {
        console.log('使用默认照片数据');
        photosData = getDefaultPhotos();
        renderGallery();
      }
    }

    // 默认照片数据（示例）
    function getDefaultPhotos() {
      return [
        {
          "id": 1,
          "src": "images/gallery/photo1.jpg",
          "title": "浙江建德三江口",
          "description": "2023年2月拍摄于浙江建德市梅城镇三江口，新安江、富春江、钱塘江交汇处。",
          "date": "2023-02",
          "location": "浙江建德"
        },
      ];
    }

    // 渲染相册
    function renderGallery() {
      const grid = document.getElementById('gallery-grid');
      const countEl = document.getElementById('gallery-count');

      if (photosData.length === 0) {
        grid.innerHTML = '<p class="gallery-empty">暂无照片，敬请期待...</p>';
        if (countEl) countEl.textContent = '';
        return;
      }

      if (countEl) {
        countEl.textContent = `${photosData.length} 张影像`;
      }

      grid.innerHTML = photosData.map((photo, index) => `
        <div class="gallery-item" data-reveal data-reveal-delay="${Math.min(index, 8) * 60}" onclick="openLightbox(${index})">
          <div class="gallery-image-wrapper">
            <img src="${photo.src}" alt="${photo.title}" loading="lazy" onload="this.classList.add('is-loaded')">
            <div class="gallery-image-overlay">
              <span class="gallery-overlay-date">${photo.date}</span>
              <span class="gallery-overlay-location">${photo.location}</span>
            </div>
          </div>
          <div class="gallery-info">
            <h3 class="gallery-title">${photo.title}</h3>
            <p class="gallery-desc">${photo.description}</p>
            <div class="gallery-meta">
              <span class="gallery-date">${photo.date}</span>
              <span class="meta-sep">·</span>
              <span class="gallery-location">${photo.location}</span>
            </div>
          </div>
        </div>
      `).join('');

      // 兜底：缓存中的图片可能不触发 onload，立即标记为已加载
      requestAnimationFrame(() => {
        grid.querySelectorAll('img').forEach(img => {
          if (img.complete && img.naturalWidth > 0) {
            img.classList.add('is-loaded');
          }
        });
      });

      // 触发新加载的卡片入场观察
      if (typeof initScrollReveal === 'function') {
        initScrollReveal();
      }
      // 绑定卡片 3D 倾斜
      if (typeof initCardTilt === 'function') {
        initCardTilt();
      }
    }

    // 打开图片详情
    function openLightbox(index) {
      currentPhotoIndex = index;
      const photo = photosData[index];
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');

      // 重置手势变换状态
      resetLightboxTransform();

      lightboxImg.classList.add('changing');
      setTimeout(() => {
        lightboxImg.src = photo.src;
        lightboxImg.classList.remove('changing');
      }, 150);

      document.getElementById('lightbox-title').textContent = photo.title;
      document.getElementById('lightbox-desc').textContent = photo.description;
      document.getElementById('lightbox-date').textContent = `${photo.date} · ${photo.location}`;

      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    // ===== Lightbox 手势：缩放 + 拖拽 =====
    let lbScale = 1, lbX = 0, lbY = 0;
    let lbDragging = false, lbStartX = 0, lbStartY = 0, lbStartTX = 0, lbStartTY = 0;

    function applyLbTransform() {
      const img = document.getElementById('lightbox-img');
      if (img) img.style.transform = `translate(${lbX}px, ${lbY}px) scale(${lbScale})`;
    }

    function resetLightboxTransform() {
      lbScale = 1; lbX = 0; lbY = 0;
      const img = document.getElementById('lightbox-img');
      if (!img) return;
      img.style.transition = 'transform 0.3s var(--ease-out)';
      applyLbTransform();
      setTimeout(() => { if (img) img.style.transition = ''; }, 300);
    }

    (function initLightboxGestures() {
      const lightbox = document.getElementById('lightbox');
      if (!lightbox) return;
      const lightboxImg = document.getElementById('lightbox-img');
      if (!lightboxImg) return;

      // 鼠标滚轮缩放
      lightbox.addEventListener('wheel', function(e) {
        if (!lightbox.classList.contains('active')) return;
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.15 : 0.15;
        lbScale = Math.max(1, Math.min(3, lbScale + delta));
        if (lbScale === 1) { lbX = 0; lbY = 0; }
        lightboxImg.style.transition = 'transform 0.15s ease-out';
        applyLbTransform();
        setTimeout(() => { lightboxImg.style.transition = ''; }, 150);
      }, { passive: false });

      // 鼠标拖拽
      lightboxImg.addEventListener('mousedown', function(e) {
        if (!lightbox.classList.contains('active')) return;
        lbDragging = true;
        lbStartX = e.clientX;
        lbStartY = e.clientY;
        lbStartTX = lbX;
        lbStartTY = lbY;
        lightboxImg.style.transition = '';
        e.preventDefault();
      });

      document.addEventListener('mousemove', function(e) {
        if (!lbDragging) return;
        const dx = e.clientX - lbStartX;
        const dy = e.clientY - lbStartY;
        if (lbScale > 1) {
          lbX = lbStartTX + dx;
          lbY = lbStartTY + dy;
          applyLbTransform();
        } else {
          lbX = dx;
          lbY = 0;
          applyLbTransform();
        }
      });

      document.addEventListener('mouseup', function(e) {
        if (!lbDragging) return;
        lbDragging = false;
        const dx = e.clientX - lbStartX;
        if (lbScale === 1) {
          if (Math.abs(dx) > 100) {
            resetLightboxTransform();
            navigatePhoto(dx > 0 ? -1 : 1);
          } else {
            resetLightboxTransform();
          }
        }
      });

      // 触摸手势
      let touchDist = 0, touchStartScale = 1, touchStartX = 0, touchStartY = 0;
      let isTouching = false, isPinching = false;

      lightboxImg.addEventListener('touchstart', function(e) {
        if (!lightbox.classList.contains('active')) return;
        if (e.touches.length === 2) {
          isPinching = true;
          touchDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          touchStartScale = lbScale;
        } else if (e.touches.length === 1) {
          isTouching = true;
          touchStartX = e.touches[0].clientX;
          touchStartY = e.touches[0].clientY;
          lbStartTX = lbX;
          lbStartTY = lbY;
        }
      }, { passive: true });

      lightboxImg.addEventListener('touchmove', function(e) {
        if (!lightbox.classList.contains('active')) return;
        if (isPinching && e.touches.length === 2) {
          e.preventDefault();
          const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          lbScale = Math.max(1, Math.min(3, touchStartScale * (dist / touchDist)));
          if (lbScale === 1) { lbX = 0; lbY = 0; }
          applyLbTransform();
        } else if (isTouching && e.touches.length === 1 && !isPinching) {
          const dx = e.touches[0].clientX - touchStartX;
          const dy = e.touches[0].clientY - touchStartY;
          if (lbScale > 1) {
            e.preventDefault();
            lbX = lbStartTX + dx;
            lbY = lbStartTY + dy;
            applyLbTransform();
          } else if (Math.abs(dx) > 10) {
            e.preventDefault();
            lbX = dx;
            applyLbTransform();
          }
        }
      }, { passive: false });

      lightboxImg.addEventListener('touchend', function(e) {
        if (isPinching && e.touches.length < 2) {
          isPinching = false;
          if (lbScale === 1) { lbX = 0; lbY = 0; applyLbTransform(); }
        }
        if (isTouching && e.touches.length === 0) {
          isTouching = false;
          if (lbScale === 1) {
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) > 80) {
              resetLightboxTransform();
              navigatePhoto(dx > 0 ? -1 : 1);
            } else {
              resetLightboxTransform();
            }
          }
        }
      });
    })();

    // 关闭图片详情
    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    // 导航照片
    function navigatePhoto(direction) {
      currentPhotoIndex += direction;
      
      if (currentPhotoIndex < 0) {
        currentPhotoIndex = photosData.length - 1;
      } else if (currentPhotoIndex >= photosData.length) {
        currentPhotoIndex = 0;
      }
      
      openLightbox(currentPhotoIndex);
    }

    // 键盘导航
    document.addEventListener('keydown', (e) => {
      const lightbox = document.getElementById('lightbox');
      if (!lightbox.classList.contains('active')) return;
      
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigatePhoto(-1);
      if (e.key === 'ArrowRight') navigatePhoto(1);
    });

    // 点击背景关闭
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') {
        closeLightbox();
      }
    });

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', loadPhotos);
  </script>
</body>
