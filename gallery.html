<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>足迹 · 刘昊</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/gallery.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0E1K9BJLZK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0E1K9BJLZK');
  </script>
</head>
<body>
  <!-- 全局顶部导航栏 -->
  <nav class="global-nav">
    <div class="container" style="position: relative;">
      <button class="mobile-nav-toggle" id="mobile-toggle" aria-label="打开菜单">☰</button>
      <div class="global-nav-inner" id="global-nav-inner">
        <a href="/" class="nav-link">首页</a>
        <a href="/cv.html" class="nav-link">简历</a>
        <a href="/publications.html" class="nav-link">成果</a>
        <a href="/courses.html" class="nav-link">课程</a>
        <a href="/gallery.html" class="nav-link active">足迹</a>
        <a href="/events.html" class="nav-link">活动</a>
      </div>
    </div>
  </nav>

  <div class="container">

    <!-- 页面标题 -->
    <header class="gallery-header" data-reveal>
      <h1 class="page-title">足迹</h1>
      <p class="gallery-count" id="gallery-count"></p>
    </header>

    <!-- 相册网格 -->
    <main class="gallery-container">
      <div id="gallery-grid" class="gallery-grid">
        <!-- 照片将通过 JavaScript 动态加载 -->
      </div>
    </main>

    <!-- 图片详情模态框 -->
    <div id="lightbox" class="lightbox">
      <div class="lightbox-content">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <button class="lightbox-nav lightbox-prev" onclick="navigatePhoto(-1)">&#8249;</button>
        <button class="lightbox-nav lightbox-next" onclick="navigatePhoto(1)">&#8250;</button>
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-caption">
          <h3 id="lightbox-title"></h3>
          <p id="lightbox-desc"></p>
          <span id="lightbox-date" class="lightbox-date"></span>
        </div>
      </div>
    </div>

    <footer>
      <p>同济大学哲学系 · 刘昊</p>
      <p>联系邮箱：<a href="mailto:liuhao1106@tongji.edu.cn">liuhao1106@tongji.edu.cn</a></p>
    </footer>
  </div>

  <script src="/js/main.js"></script>
  <script>
    // 加载照片数据
    let photosData = [];
    let currentPhotoIndex = 0;

    // 从 JSON 文件加载照片数据
    async function loadPhotos() {
      try {
        photosData = await fetchJSON('data/photos.json', []);
        renderGallery();
      } catch (error) {
        console.log('使用默认照片数据');
        photosData = getDefaultPhotos();
        renderGallery();
      }
    }

    // 默认照片数据（示例）
    function getDefaultPhotos() {
      return [
        {
          "id": 1,
          "src": "images/gallery/photo1.jpg",
          "title": "浙江建德三江口",
          "description": "2023年2月拍摄于浙江建德市梅城镇三江口，新安江、富春江、钱塘江交汇处。",
          "date": "2023-02",
          "location": "浙江建德"
        },
      ];
    }

    // 渲染相册
    function renderGallery() {
      const grid = document.getElementById('gallery-grid');
      const countEl = document.getElementById('gallery-count');

      if (photosData.length === 0) {
        grid.innerHTML = '<p class="gallery-empty">暂无照片，敬请期待...</p>';
        if (countEl) countEl.textContent = '';
        return;
      }

      if (countEl) {
        countEl.textContent = `${photosData.length} 张影像`;
      }

      grid.innerHTML = photosData.map((photo, index) => `
        <div class="gallery-item" data-reveal data-reveal-delay="${Math.min(index, 8) * 60}" onclick="openLightbox(${index})">
          <div class="gallery-image-wrapper">
            <img src="${photo.src}" alt="${photo.title}" loading="lazy" onload="this.classList.add('is-loaded')">
            <div class="gallery-image-overlay">
              <span class="gallery-overlay-date">${photo.date}</span>
              <span class="gallery-overlay-location">${photo.location}</span>
            </div>
          </div>
          <div class="gallery-info">
            <h3 class="gallery-title">${photo.title}</h3>
            <p class="gallery-desc">${photo.description}</p>
            <div class="gallery-meta">
              <span class="gallery-date">${photo.date}</span>
              <span class="meta-sep">·</span>
              <span class="gallery-location">${photo.location}</span>
            </div>
          </div>
        </div>
      `).join('');

      // 兜底：缓存中的图片可能不触发 onload，立即标记为已加载
      requestAnimationFrame(() => {
        grid.querySelectorAll('img').forEach(img => {
          if (img.complete && img.naturalWidth > 0) {
            img.classList.add('is-loaded');
          }
        });
      });

      // 触发新加载的卡片入场观察
      if (typeof initScrollReveal === 'function') {
        initScrollReveal();
      }
    }

    // 打开图片详情
    function openLightbox(index) {
      currentPhotoIndex = index;
      const photo = photosData[index];
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');

      lightboxImg.classList.add('changing');
      setTimeout(() => {
        lightboxImg.src = photo.src;
        lightboxImg.classList.remove('changing');
      }, 150);

      document.getElementById('lightbox-title').textContent = photo.title;
      document.getElementById('lightbox-desc').textContent = photo.description;
      document.getElementById('lightbox-date').textContent = `${photo.date} · ${photo.location}`;

      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    // 关闭图片详情
    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    // 导航照片
    function navigatePhoto(direction) {
      currentPhotoIndex += direction;
      
      if (currentPhotoIndex < 0) {
        currentPhotoIndex = photosData.length - 1;
      } else if (currentPhotoIndex >= photosData.length) {
        currentPhotoIndex = 0;
      }
      
      openLightbox(currentPhotoIndex);
    }

    // 键盘导航
    document.addEventListener('keydown', (e) => {
      const lightbox = document.getElementById('lightbox');
      if (!lightbox.classList.contains('active')) return;
      
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigatePhoto(-1);
      if (e.key === 'ArrowRight') navigatePhoto(1);
    });

    // 点击背景关闭
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') {
        closeLightbox();
      }
    });

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', loadPhotos);
  </script>
</body>
</html>
