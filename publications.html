<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学术成果 · 刘昊</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0E1K9BJLZK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0E1K9BJLZK');
  </script>
</head>
<body>

  <nav class="global-nav">
    <div class="container" style="position: relative;">
      <button class="mobile-nav-toggle" id="mobile-toggle" aria-label="打开菜单">☰</button>
      <div class="global-nav-inner" id="global-nav-inner">
        <a href="/" class="nav-link">首页</a>
        <a href="/cv.html" class="nav-link">简历</a>
        <a href="/publications.html" class="nav-link active">成果</a>
        <a href="/courses.html" class="nav-link">课程</a>
        <a href="/gallery.html" class="nav-link">足迹</a>
        <a href="/events.html" class="nav-link">活动</a>
      </div>
    </div>
  </nav>

  <div class="container">

    <header class="page-header" data-reveal>
      <h1>学术成果</h1>
      <p class="page-meta">刘昊 · 同济大学哲学系</p>
    </header>

    <div class="two-col-layout" data-reveal>
      <aside class="layout-sidebar">
        <nav class="sidebar-nav" id="pub-nav">
          <!-- 侧边导航将通过 JS 动态生成 -->
        </nav>
      </aside>

      <div class="layout-main" id="pub-content">
        <!-- 成果内容将通过 JS 动态加载 -->
      </div>
    </div>

    <footer>
      <p>同济大学哲学系 · 刘昊</p>
      <p><a href="mailto:liuhao1106@tongji.edu.cn">联系邮箱</a></p>
    </footer>
  </div>

  <script src="/js/main.js"></script>
  <script>
    const PUB_SECTIONS = [
      { key: 'books',       id: 'books',       label: '著作' },
      { key: 'papers',      id: 'papers',      label: '期刊论文' },
      { key: 'translations', id: 'translations', label: '译文' },
      { key: 'newspapers',  id: 'newspapers',  label: '报纸' }
    ];

    function renderPubEntry(item, index) {
      let metaParts = [];
      if (item.author) metaParts.push(item.author);
      if (item.translator) metaParts.push(item.translator);
      if (item.journal) metaParts.push(item.journal);
      if (item.publisher) metaParts.push(item.publisher);
      if (item.date) metaParts.push(item.date);
      if (item.cssci) metaParts.push('CSSCI');
      if (item.note) metaParts.push(item.note);
      return `
        <div class="pub-entry">
          <p class="pub-title"><span class="pub-num">${index}.</span>${item.title}</p>
          <p class="pub-meta">${metaParts.join(' · ')}</p>
        </div>
      `;
    }

    async function loadPublications() {
      const data = await fetchJSON('data/publications.json', { books: [], papers: [], translations: [], newspapers: [] });

      // 渲染侧边导航
      const nav = document.getElementById('pub-nav');
      nav.innerHTML = PUB_SECTIONS.map((s, i) =>
        `<a href="#${s.id}" class="sidebar-nav-item${i === 0 ? ' active' : ''}">${s.label}</a>`
      ).join('');

      // 渲染内容区
      const content = document.getElementById('pub-content');
      content.innerHTML = PUB_SECTIONS.map(s => {
        const items = data[s.key] || [];
        if (items.length === 0) return '';
        return `
          <section class="content-section" id="${s.id}">
            <h2>${s.label}</h2>
            ${items.map((item, i) => renderPubEntry(item, i + 1)).join('')}
          </section>
        `;
      }).join('');

      // 侧边导航高亮（滚动同步）
      const navItems = nav.querySelectorAll('.sidebar-nav-item');
      navItems.forEach(item => {
        item.addEventListener('click', function() {
          navItems.forEach(n => n.classList.remove('active'));
          this.classList.add('active');
        });
      });
    }

    document.addEventListener('DOMContentLoaded', loadPublications);
  </script>
</body>
</html>
