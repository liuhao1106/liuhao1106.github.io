**宋明理学**，又称**道学**，是宋明时期儒家哲学的主要形态。它以**理**为核心概念，探讨宇宙本体、人性善恶、修养工夫等问题。

## 主要流派

### 1. 程朱理学
- **代表人物**：程颢、程颐、朱熹
- **核心思想**：
  - "理一分殊" - 万物各具其理，又同出一源
  - "性即理" - 人性本善，源于天理
  - "格物致知" - 通过穷究事物之理来获得知识

### 2. 陆王心学
- **代表人物**：陆九渊、王阳明
- **核心思想**：
  - "心即理" - 心即是理，不假外求
  - "致良知" - 发明本心，恢复良知
  - "知行合一" - 知与行不可分割

## 经典语录

> "存天理，灭人欲。" ——朱熹

> "宇宙便是吾心，吾心即是宇宙。" ——陆九渊

## 工夫次第

| 阶段 | 内容 | 目的 |
|------|------|------|
| 小学 | 洒扫应对 | 培养基本行为规范 |
| 大学 | 格物致知 | 穷究事物之理 |
| 修身 | 诚意正心 | 涵养德性 |
| 治国 | 齐家治国 | 推己及人 |

## 代码示例

  return classics[bookName] || '未知';
}
