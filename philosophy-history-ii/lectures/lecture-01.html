  <!-- Marked.js for Markdown rendering -->

  <style>
    /* 讲义页面专用样式 */
    .lecture-page {
      background: var(--bg-page);
    }

    .lecture-header {
      display: none;
    }

    /* 讲义正文样式 */
    .lecture-body {
      font-size: 1rem;
      line-height: 1.9;
      color: var(--text-secondary);
    }

    .lecture-body h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: var(--space-2);
      color: var(--text-primary);
      line-height: 1.4;
    }

    .lecture-body h1 + blockquote {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: var(--space-8);
      padding: var(--space-4);
      background: rgba(0, 0, 0, 0.02);
      border-left: 3px solid var(--text-muted);
      border-radius: 0 4px 4px 0;
    }

    .lecture-body h1 + blockquote p {
      margin: 0;
      line-height: 1.7;
    }

    .lecture-body h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: var(--space-10) 0 var(--space-5);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--border-light);
      letter-spacing: 0.02em;
    }

    .lecture-body h2:first-child {
      margin-top: 0;
    }

    .lecture-body h3 {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: var(--space-8) 0 var(--space-4);
      letter-spacing: 0.01em;
    }

    .lecture-body h4 {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: var(--space-6) 0 var(--space-3);
    }

    .lecture-body p {
      margin-bottom: var(--space-4);
      text-align: justify;
    }

    .lecture-body ul,
    .lecture-body ol {
      margin: var(--space-4) 0;
      padding-left: var(--space-6);
    }

    .lecture-body li {
      margin-bottom: var(--space-3);
      line-height: 1.85;
    }

    .lecture-body li::marker {
      color: var(--text-muted);
    }

    .lecture-body strong {
      color: var(--text-primary) !important;
      font-weight: 700 !important;
    }

    .lecture-body b {
      color: var(--text-primary) !important;
      font-weight: 700 !important;
    }

    .lecture-body em {
      color: var(--text-muted);
      font-style: italic;
    }

    .lecture-body blockquote {
      margin: var(--space-5) 0;
      padding: var(--space-4) var(--space-5);
      background: rgba(0, 0, 0, 0.02);
      border-left: 3px solid var(--text-muted);
      border-radius: 0 4px 4px 0;
    }

    .lecture-body blockquote p {
      margin-bottom: var(--space-2);
    }

    .lecture-body blockquote p:last-child {
      margin-bottom: 0;
    }

    .lecture-body hr {
      border: none;
      height: 1px;
      background: var(--border-light);
      margin: var(--space-8) 0;
    }

    .lecture-body code {
      font-family: 'LXGW WenKai Mono', monospace;
      background: rgba(0, 0, 0, 0.05);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
    }

    .lecture-body pre {
      background: rgba(0, 0, 0, 0.03);
      padding: var(--space-4);
      border-radius: 4px;
      overflow-x: auto;
      margin: var(--space-4) 0;
    }

    .lecture-body pre code {
      background: none;
      padding: 0;
    }

    /* 版权声明 */
    .lecture-body hr + p:last-child {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: var(--space-10);
      color: var(--text-muted);
    }

    /* 移动端适配 */
    @media (max-width: 640px) {
      .lecture-body {
        font-size: 0.95rem;
      }

      .lecture-body h1 {
        font-size: 1.4rem;
      }

      .lecture-body h2 {
        font-size: 1.2rem;
      }

      .lecture-body h3 {
        font-size: 1.05rem;
      }
    }
  </style>
</head>
<body class="lecture-page">

  <!-- 全局顶部导航栏 -->
  <nav class="global-nav">
    <div class="container" style="position: relative;">
      <button class="mobile-nav-toggle" id="mobile-toggle" aria-label="打开菜单">☰</button>
      <div class="global-nav-inner" id="global-nav-inner">
        <a href="/" class="nav-link">首页</a>
        <a href="/cv.html" class="nav-link">简历</a>
        <a href="/publications.html" class="nav-link">成果</a>
        <a href="/courses.html" class="nav-link active">课程</a>
        <a href="/gallery.html" class="nav-link">足迹</a>
        <a href="/events.html" class="nav-link">活动</a>
      </div>
    </div>
  </nav>

  <div class="container">

    <!-- 讲义正文 -->
    <article class="lecture-body" id="lecture-content">
      <div class="loading">正在加载讲义内容...</div>
    </article>

    <!-- 分页导航 -->
    <nav class="pagination">
      <a href="../index.html#course-lectures" class="prev">← 返回课程主页</a>
    </nav>

    <footer>
      <p>同济大学哲学系 · 刘昊</p>
      <p><a href="mailto:liuhao1106@tongji.edu.cn">联系邮箱</a></p>
    </footer>
  </div>

  <script>
    // 移动端导航
    (function() {
      const toggle = document.getElementById('mobile-toggle');
      const nav = document.getElementById('global-nav-inner');
      if (toggle && nav) {
        toggle.addEventListener('click', function(e) {
          e.stopPropagation();
          nav.classList.toggle('open');
          toggle.textContent = nav.classList.contains('open') ? '✕' : '☰';
          toggle.setAttribute('aria-label', nav.classList.contains('open') ? '关闭菜单' : '打开菜单');
        });
        document.addEventListener('click', function(e) {
          if (!toggle.contains(e.target) && !nav.contains(e.target)) {
            nav.classList.remove('open');
            toggle.textContent = '☰';
            toggle.setAttribute('aria-label', '打开菜单');
          }
        });
      }
    })();

    // Markdown 渲染配置
    marked.setOptions({
      breaks: true,
      gfm: true
    });

    // 加载并渲染 Markdown 文件
    fetch('lecture-01.md')
      .then(response => {
        if (!response.ok) {
          throw new Error('无法加载讲义文件');
        }
        return response.text();
      })
      .then(markdown => {
        document.getElementById('lecture-content').innerHTML = marked.parse(markdown);
        // 更新页面标题
        const h1 = document.querySelector('.lecture-body h1');
        if (h1) {
          document.title = h1.textContent + ' · 中国哲学史（下）';
        }
      })
      .catch(error => {
        document.getElementById('lecture-content').innerHTML = 
          '<p style="color: var(--text-muted); text-align: center; padding: 40px 0;">加载讲义内容失败，请刷新页面重试。</p>';
        console.error('Error loading markdown:', error);
      });
  </script>
</body>
</html>
