<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活动 · 刘昊</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/events.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0E1K9BJLZK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0E1K9BJLZK');
  </script>
</head>
<body>
  <!-- 全局顶部导航栏 -->
  <nav class="global-nav">
    <div class="container" style="position: relative;">
      <button class="mobile-nav-toggle" id="mobile-toggle" aria-label="打开菜单">☰</button>
      <div class="global-nav-inner" id="global-nav-inner">
        <a href="/" class="nav-link">首页</a>
        <a href="/cv.html" class="nav-link">简历</a>
        <a href="/publications.html" class="nav-link">成果</a>
        <a href="/courses.html" class="nav-link">课程</a>
        <a href="/gallery.html" class="nav-link">足迹</a>
        <a href="/events.html" class="nav-link active">活动</a>
      </div>
    </div>
  </nav>

  <div class="container">

    <!-- 页面标题 -->
    <header class="page-header" data-reveal>
      <h1 class="page-title">活动</h1>
      <p class="page-subtitle">学术活动 · 媒体采访</p>
    </header>

    <!-- 活动内容区域 -->
    <main class="events-container" data-reveal>
      
      <!-- 学术活动 -->
      <section class="event-section">
        <div class="section-header">
          <h2 class="section-icon">🎤</h2>
          <h2 class="section-title">学术活动</h2>
        </div>
        <div class="event-list" id="academic-list">
          <!-- 学术活动将通过 JavaScript 动态加载 -->
        </div>
      </section>

      <!-- 媒体采访 -->
      <section class="event-section">
        <div class="section-header">
          <h2 class="section-icon">📺</h2>
          <h2 class="section-title">媒体</h2>
        </div>
        <div class="event-list" id="media-list">
          <!-- 媒体内容将通过 JavaScript 动态加载 -->
        </div>
      </section>

    </main>

    <footer>
      <p>同济大学哲学系 · 刘昊</p>
      <p>联系邮箱：<a href="mailto:liuhao1106@tongji.edu.cn">liuhao1106@tongji.edu.cn</a></p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>
  <script src="/js/main.js"></script>
  <script>
    // 加载活动数据
    let eventsData = [];

    // 从 JSON 文件加载数据
    async function loadEvents() {
      try {
        const response = await fetch('data/events.json');
        if (!response.ok) {
          eventsData = getDefaultEvents();
        } else {
          eventsData = await response.json();
        }
        renderEvents();
      } catch (error) {
        console.log('使用默认活动数据');
        eventsData = getDefaultEvents();
        renderEvents();
      }
    }

    // 默认活动数据
    function getDefaultEvents() {
      return {
        "media": [
          {
            "id": 1,
            "title": "采访标题示例",
            "description": "采访内容描述...",
            "date": "2024-01",
            "source": "媒体来源"
          }
        ],
        "academic": [
          {
            "id": 1,
            "title": "学术活动标题示例",
            "description": "活动内容描述...",
            "date": "2024-01",
            "location": "活动地点"
          }
        ]
      };
    }

    // 渲染活动列表
    function renderEvents() {
      // 渲染媒体
      const mediaList = document.getElementById('media-list');
      if (mediaList && eventsData.media && eventsData.media.length > 0) {
        mediaList.innerHTML = eventsData.media.map((item, index) => `
          <div class="event-card">
            <div class="event-date">${item.date}</div>
            <h3 class="event-title">
              ${index + 1}. ${item.url ? `<a href="${item.url}" target="_blank" class="event-link">${item.title}</a>` : item.title}
            </h3>
            <p class="event-desc">${item.description}</p>
            <span class="event-source">${item.source}</span>
          </div>
        `).join('');
      } else if (mediaList) {
        mediaList.innerHTML = '<p class="empty-text">暂无媒体采访</p>';
      }

      // 渲染学术活动
      const academicList = document.getElementById('academic-list');
      if (academicList && eventsData.academic && eventsData.academic.length > 0) {
        academicList.innerHTML = eventsData.academic.map((item, index) => `
          <div class="event-card">
            <div class="event-date">${item.date}</div>
            <h3 class="event-title">
              ${index + 1}. ${item.url ? `<a href="${item.url}" target="_blank" class="event-link">${item.title}</a>` : item.title}
            </h3>
            <p class="event-desc">${item.description}</p>
            <span class="event-location">📍 ${item.location}</span>
          </div>
        `).join('');
      } else if (academicList) {
        academicList.innerHTML = '<p class="empty-text">暂无学术活动</p>';
      }
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', loadEvents);
  </script>
</body>
</html>
