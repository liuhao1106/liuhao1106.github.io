<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开设课程 · 刘昊</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0E1K9BJLZK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0E1K9BJLZK');
  </script>
</head>
<body>

  <nav class="global-nav">
    <div class="container" style="position: relative;">
      <button class="mobile-nav-toggle" id="mobile-toggle" aria-label="打开菜单">☰</button>
      <div class="global-nav-inner" id="global-nav-inner">
        <a href="/" class="nav-link">首页</a>
        <a href="/cv.html" class="nav-link">简历</a>
        <a href="/publications.html" class="nav-link">成果</a>
        <a href="/courses.html" class="nav-link active">课程</a>
        <a href="/gallery.html" class="nav-link">足迹</a>
        <a href="/events.html" class="nav-link">活动</a>
      </div>
    </div>
  </nav>

  <div class="container">

    <header class="page-header" data-reveal>
      <h1>开设课程</h1>
      <p class="page-meta">同济大学哲学系 · 刘昊</p>
    </header>

    <div class="two-col-layout" data-reveal>
      <aside class="layout-sidebar">
        <nav class="sidebar-nav" id="course-nav">
          <!-- 侧边导航将通过 JS 动态生成 -->
        </nav>
      </aside>

      <div class="layout-main" id="course-content">
        <!-- 课程内容将通过 JS 动态加载 -->
      </div>
    </div>

    <footer>
      <p>同济大学哲学系 · 刘昊</p>
      <p><a href="mailto:liuhao1106@tongji.edu.cn">联系邮箱</a></p>
    </footer>
  </div>

  <script src="/js/main.js"></script>
  <script>
    async function loadCourses() {
      const data = await fetchJSON('data/courses.json', { categories: [], courses: [] });
      const categories = data.categories || [];
      const courses = data.courses || [];

      // 渲染侧边导航
      const nav = document.getElementById('course-nav');
      nav.innerHTML = categories.map((cat, i) =>
        `<a href="#${cat.id}" class="sidebar-nav-item${i === 0 ? ' active' : ''}">${cat.name}</a>`
      ).join('');

      // 渲染课程内容
      const content = document.getElementById('course-content');
      content.innerHTML = categories.map(cat => {
        const catCourses = courses.filter(c => c.category === cat.id);
        if (catCourses.length === 0) {
          return `<section class="content-section" id="${cat.id}"><h2>${cat.name}</h2><p>暂无课程</p></section>`;
        }
        return `
          <section class="content-section" id="${cat.id}">
            <h2>${cat.name}</h2>
            ${catCourses.map(course => {
              const isCurrent = course.semester && course.semester.includes('2026');
              return `
              <div class="course-entry">
                <div class="course-entry-header">
                  <h3>${course.title}</h3>
                  <span class="course-tag${isCurrent ? ' current' : ''}">${course.semester}</span>
                </div>
                <p class="course-entry-desc">${course.shortDesc}</p>
                <p class="course-entry-meta">时间：${course.schedule} · ${course.credits}</p>
                ${course.link && course.link !== '#' ? `<a href="${course.link}" class="course-entry-link">进入课程 →</a>` : '<span class="course-entry-link" style="opacity: 0.5;">即将开设</span>'}
              </div>
            `}).join('')}
          </section>
        `;
      }).join('');

      // 侧边导航高亮
      const navItems = nav.querySelectorAll('.sidebar-nav-item');
      navItems.forEach(item => {
        item.addEventListener('click', function() {
          navItems.forEach(n => n.classList.remove('active'));
          this.classList.add('active');
        });
      });
    }

    document.addEventListener('DOMContentLoaded', loadCourses);
  </script>
</body>
</html>
