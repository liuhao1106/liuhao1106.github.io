<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人简历 · 刘昊</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0E1K9BJLZK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0E1K9BJLZK');
  </script>
</head>
<body>

  <nav class="global-nav">
    <div class="container" style="position: relative;">
      <button class="mobile-nav-toggle" id="mobile-toggle" aria-label="打开菜单">☰</button>
      <div class="global-nav-inner" id="global-nav-inner">
        <a href="/" class="nav-link">首页</a>
        <a href="/cv.html" class="nav-link active">简历</a>
        <a href="/publications.html" class="nav-link">成果</a>
        <a href="/courses.html" class="nav-link">课程</a>
        <a href="/gallery.html" class="nav-link">足迹</a>
        <a href="/events.html" class="nav-link">活动</a>
      </div>
    </div>
  </nav>

  <div class="container">

    <header class="page-header" data-reveal>
      <h1>个人简历</h1>
      <p class="page-meta" id="last-updated">刘昊 · 同济大学哲学系</p>
    </header>

    <div class="two-col-layout" data-reveal>
      <aside class="layout-sidebar">
        <nav class="sidebar-nav" id="cv-nav">
          <!-- 侧边导航将通过 JS 动态生成 -->
        </nav>
      </aside>

      <div class="layout-main" id="cv-content">
        <!-- 简历内容将通过 JS 动态加载 -->
      </div>
    </div>

    <footer>
      <p>同济大学哲学系 · 刘昊</p>
      <p><a href="mailto:liuhao1106@tongji.edu.cn">联系邮箱</a></p>
    </footer>
  </div>

  <script src="/js/main.js"></script>
  <script>
    function esc(s) { return s || ''; }

    function renderList(items) {
      return `<ul>${items.map(i => `<li>${i}</li>`).join('')}</ul>`;
    }

    function renderPubEntry(item, index) {
      let metaParts = [];
      if (item.author) metaParts.push(item.author);
      if (item.translator) metaParts.push(item.translator);
      if (item.journal) metaParts.push(item.journal);
      if (item.publisher) metaParts.push(item.publisher);
      if (item.date) metaParts.push(item.date);
      if (item.cssci) metaParts.push('CSSCI');
      if (item.note) metaParts.push(item.note);
      return `<li><span class="pub-num">${index}.</span>${item.title} — ${metaParts.join(' · ')}</li>`;
    }

    const COURSE_GROUPS = [
      { key: 'undergraduateRequired', label: '本科生必修课' },
      { key: 'undergraduateElective', label: '本科生选修课' },
      { key: 'master', label: '硕士生' },
      { key: 'general', label: '通识课' }
    ];

    async function loadCV() {
      const [profile, pubs] = await Promise.all([
        fetchJSON('data/profile.json', null),
        fetchJSON('data/publications.json', { books: [], papers: [], translations: [], newspapers: [] })
      ]);

      if (!profile) {
        document.getElementById('cv-content').innerHTML = '<p>简历数据加载失败。</p>';
        return;
      }

      // 更新最后更新日期
      const updatedEl = document.getElementById('last-updated');
      updatedEl.textContent = `最近更新：${profile.lastUpdated}`;

      // 定义各章节
      const sections = [
        { id: 'basic-info', label: '基本信息', render: () => `
          <p><strong>职称：</strong>${esc(profile.basicInfo.title)}<br>
          <strong>单位：</strong>${esc(profile.basicInfo.department)}<br>
          <strong>地址：</strong>${esc(profile.basicInfo.address)}<br>
          <strong>邮件：</strong><a href="mailto:${esc(profile.basicInfo.email)}">${esc(profile.basicInfo.email)}</a></p>
        `},
        { id: 'education', label: '教育背景', render: () =>
          `<ul>${profile.education.map(e => `<li>${esc(e.period)} ${esc(e.institution)} ${esc(e.status)}</li>`).join('')}</ul>`
        },
        { id: 'work', label: '工作履历', render: () =>
          `<ul>${profile.work.map(w => `<li>${esc(w.period)} ${esc(w.position)}${w.note ? `（${esc(w.note)}）` : ''}</li>`).join('')}</ul>`
        },
        { id: 'research', label: '研究领域', render: () => renderList(profile.research) },
        { id: 'honors', label: '荣誉', render: () =>
          `<ul>${profile.honors.map(h => `<li>${esc(h.year)} ${esc(h.title)}</li>`).join('')}</ul>`
        },
        { id: 'positions', label: '社会兼职', render: () =>
          `<ul>${profile.positions.map(p => `<li>${esc(p.organization)} ${esc(p.role)}</li>`).join('')}</ul>`
        },
        { id: 'publications', label: '著作', render: () =>
          `<p>${esc(pubs.books[0].title)}，${esc(pubs.books[0].publisher)}，${esc(pubs.books[0].date)}。</p>`
        },
        { id: 'papers', label: '期刊论文', render: () => {
          let html = '<h3>一. 中文论文</h3><ul>';
          html += pubs.papers.map((p, i) => renderPubEntry(p, i + 1)).join('');
          html += '</ul>';
          if (pubs.translations.length > 0) {
            html += '<h3>二. 译文</h3><ul>';
            html += pubs.translations.map((p, i) => renderPubEntry(p, i + 1)).join('');
            html += '</ul>';
          }
          if (pubs.newspapers.length > 0) {
            html += '<h3>三. 报纸</h3><ul>';
            html += pubs.newspapers.map((p, i) => renderPubEntry(p, i + 1)).join('');
            html += '</ul>';
          }
          return html;
        }},
        { id: 'projects', label: '研究项目', render: () =>
          `<ul>${profile.projects.map(p => `<li>${esc(p.year)} ${esc(p.title)}${p.note ? `（${esc(p.note)}）` : ''}</li>`).join('')}</ul>`
        },
        { id: 'conferences', label: '讲座报告', render: () =>
          `<ul>${profile.conferences.map(c => `<li>${esc(c.title)}，${esc(c.date)}，${esc(c.location)}</li>`).join('')}</ul>`
        },
        { id: 'courses', label: '开设课程', render: () => {
          return COURSE_GROUPS.map(g => {
            const items = profile.courses[g.key] || [];
            if (items.length === 0) return '';
            return `<h3>${g.label}</h3><ul>${items.map(c => `<li>${esc(c.name)}（${esc(c.period)}${c.status === '已停开' ? '，已停开' : ''}）</li>`).join('')}</ul>`;
          }).join('');
        }}
      ];

      // 渲染侧边导航
      const nav = document.getElementById('cv-nav');
      nav.innerHTML = sections.map((s, i) =>
        `<a href="#${s.id}" class="sidebar-nav-item${i === 0 ? ' active' : ''}">${s.label}</a>`
      ).join('');

      // 渲染内容
      const content = document.getElementById('cv-content');
      content.innerHTML = sections.map(s => `
        <section class="content-section" id="${s.id}">
          <h2>${s.label}</h2>
          ${s.render()}
        </section>
      `).join('');

      // 侧边导航高亮
      const navItems = nav.querySelectorAll('.sidebar-nav-item');
      navItems.forEach(item => {
        item.addEventListener('click', function() {
          navItems.forEach(n => n.classList.remove('active'));
          this.classList.add('active');
        });
      });
    }

    document.addEventListener('DOMContentLoaded', loadCV);
  </script>
</body>
</html>
